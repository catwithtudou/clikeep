name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.7"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check formatting
        run: test -z "$(gofmt -l cmd internal)"

      - name: Validate skills
        run: python3 scripts/validate_skills.py skills

      - name: Skills package smoke
        run: npx -y --registry=https://registry.npmjs.org skills@latest add ./ --list

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...
