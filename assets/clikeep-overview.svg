<svg width="1100" height="720" viewBox="0 0 1100 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main Workflow Arrow -->
    <marker id="arrow-main" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#646a73" />
    </marker>
    <!-- Read Data Arrow -->
    <marker id="arrow-read" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#8569cb" />
    </marker>
    <!-- Write Data Arrow -->
    <marker id="arrow-write" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#5178c6" />
    </marker>
  </defs>

  <!-- Global Canvas Background -->
  <rect x="0" y="0" width="1100" height="720" fill="#ffffff" />

  <!-- Global Header -->
  <text x="40" y="56" fill="#1f2329" font-size="24" font-weight="bold">clikeep Architecture &amp; Workflow</text>
  <text x="40" y="80" fill="#646a73" font-size="14">Local-first CLI update manager with strict explicit profiles and secure execution boundaries</text>

  <!-- ========================================================= -->
  <!-- ZONE 1: CORE WORKFLOW (LEFT COLUMN)                       -->
  <!-- ========================================================= -->
  <rect x="40" y="110" width="660" height="570" rx="8" fill="#f0f4fc" stroke="#d6dcf3" stroke-width="1.5" />
  <text x="64" y="144" fill="#5263a5" font-size="16" font-weight="bold">Core Execution Pipeline</text>

  <!-- Node: Trigger -->
  <rect x="250" y="160" width="240" height="44" rx="6" fill="#5178c6" />
  <text x="370" y="187" fill="#ffffff" font-size="15" font-weight="bold" text-anchor="middle">clikeep update</text>
  <line x1="370" y1="204" x2="370" y2="236" stroke="#646a73" stroke-width="2" marker-end="url(#arrow-main)" />

  <!-- Node: Plan -->
  <rect x="250" y="240" width="240" height="50" rx="6" fill="#ffffff" stroke="#5178c6" stroke-width="2" />
  <text x="370" y="260" fill="#1f2329" font-size="14" font-weight="bold" text-anchor="middle">Generate Plan</text>
  <text x="370" y="278" fill="#646a73" font-size="12" text-anchor="middle">Parse explicit profile dependencies</text>
  <line x1="370" y1="290" x2="370" y2="326" stroke="#646a73" stroke-width="2" marker-end="url(#arrow-main)" />

  <!-- Node: Gate -->
  <rect x="250" y="330" width="240" height="44" rx="22" fill="#fef1ce" stroke="#d4b45b" stroke-width="2" />
  <text x="370" y="357" fill="#1f2329" font-size="14" font-weight="bold" text-anchor="middle">Interactive / --yes</text>
  <line x1="370" y1="374" x2="370" y2="416" stroke="#646a73" stroke-width="2" marker-end="url(#arrow-main)" />

  <!-- Node: Run Phase (Container) -->
  <rect x="130" y="420" width="480" height="130" rx="6" fill="#ffffff" stroke="#bbbfc4" stroke-width="1.5" stroke-dasharray="4 4" />
  <text x="146" y="446" fill="#5178c6" font-size="14" font-weight="bold">Run Phase Execution</text>

  <!-- Sub-Node: Sequential Loop -->
  <rect x="146" y="458" width="216" height="76" rx="4" fill="#f5f5f5" stroke="#dee0e3" />
  <text x="160" y="480" fill="#1f2329" font-size="13" font-weight="bold">Sequential execution</text>
  <text x="160" y="496" fill="#646a73" font-size="12">Execute per profile command</text>
  <!-- Mini Flow -->
  <rect x="160" y="504" width="36" height="20" rx="2" fill="#ffffff" stroke="#bbbfc4" />
  <text x="178" y="518" fill="#1f2329" font-size="11" text-anchor="middle">P1</text>
  <line x1="200" y1="514" x2="212" y2="514" stroke="#8f959e" stroke-width="1.5" marker-end="url(#arrow-main)" />
  <rect x="216" y="504" width="36" height="20" rx="2" fill="#ffffff" stroke="#bbbfc4" />
  <text x="234" y="518" fill="#1f2329" font-size="11" text-anchor="middle">P2</text>
  <line x1="256" y1="514" x2="268" y2="514" stroke="#8f959e" stroke-width="1.5" marker-end="url(#arrow-main)" />
  <rect x="272" y="504" width="36" height="20" rx="2" fill="#ffffff" stroke="#bbbfc4" />
  <text x="290" y="518" fill="#1f2329" font-size="11" text-anchor="middle">...</text>

  <!-- Sub-Node: Real-time Progress -->
  <rect x="378" y="458" width="216" height="76" rx="4" fill="#f5f5f5" stroke="#dee0e3" />
  <text x="392" y="480" fill="#1f2329" font-size="13" font-weight="bold">Real-time Progress</text>
  <text x="392" y="496" fill="#646a73" font-size="12">Live terminal feedback</text>
  <!-- Progress Bar Mock -->
  <rect x="392" y="508" width="188" height="10" rx="5" fill="#dee0e3" />
  <rect x="392" y="508" width="112" height="10" rx="5" fill="#5178c6" />
  <text x="512" y="504" fill="#5178c6" font-size="10" font-weight="bold">60%</text>

  <line x1="370" y1="550" x2="370" y2="576" stroke="#646a73" stroke-width="2" marker-end="url(#arrow-main)" />

  <!-- Node: Summary Container -->
  <rect x="130" y="580" width="480" height="84" rx="6" fill="#ffffff" stroke="#bbbfc4" stroke-width="1.5" />
  <text x="146" y="604" fill="#1f2329" font-size="14" font-weight="bold">Summary Output</text>

  <!-- Success Outcome -->
  <rect x="146" y="614" width="216" height="38" rx="4" fill="#dff5e5" stroke="#509863" stroke-width="1" />
  <circle cx="164" cy="633" r="7" fill="#509863" />
  <polyline points="160,633 163,636 168,630" fill="none" stroke="#ffffff" stroke-width="1.5" />
  <text x="180" y="628" fill="#509863" font-size="12" font-weight="bold">Success</text>
  <text x="180" y="644" fill="#1f2329" font-size="11">Concise display of items</text>

  <!-- Failure Outcome -->
  <rect x="378" y="614" width="216" height="38" rx="4" fill="#fee3e2" stroke="#d25d5a" stroke-width="1" />
  <circle cx="396" cy="633" r="7" fill="#d25d5a" />
  <line x1="393" y1="630" x2="399" y2="636" stroke="#ffffff" stroke-width="1.5" />
  <line x1="399" y1="630" x2="393" y2="636" stroke="#ffffff" stroke-width="1.5" />
  <text x="412" y="628" fill="#d25d5a" font-size="12" font-weight="bold">Failure</text>
  <text x="412" y="644" fill="#1f2329" font-size="11">Show detailed log tail</text>


  <!-- ========================================================= -->
  <!-- ZONE 2: STORAGE & CONFIG (TOP RIGHT)                      -->
  <!-- ========================================================= -->
  <rect x="740" y="110" width="320" height="160" rx="8" fill="#f5f5f5" stroke="#dee0e3" stroke-width="1.5" />
  <text x="760" y="136" fill="#1f2329" font-size="14" font-weight="bold">Data &amp; State Layer</text>

  <!-- XDG Config -->
  <rect x="760" y="150" width="280" height="44" rx="4" fill="#ffffff" stroke="#bbbfc4" stroke-width="1" />
  <rect x="772" y="162" width="4" height="20" fill="#8569cb" />
  <text x="784" y="176" fill="#8569cb" font-size="14" font-weight="bold">XDG config</text>
  <text x="872" y="175" fill="#646a73" font-size="12">Explicit user profiles</text>

  <!-- XDG State -->
  <rect x="760" y="204" width="280" height="44" rx="4" fill="#ffffff" stroke="#bbbfc4" stroke-width="1" />
  <rect x="772" y="216" width="4" height="20" fill="#5178c6" />
  <text x="784" y="230" fill="#5178c6" font-size="14" font-weight="bold">XDG state</text>
  <text x="864" y="229" fill="#646a73" font-size="12">Runtime logs &amp; progress</text>


  <!-- ========================================================= -->
  <!-- ZONE 3: AUXILIARY COMMANDS (MIDDLE RIGHT)                 -->
  <!-- ========================================================= -->
  <rect x="740" y="290" width="320" height="170" rx="8" fill="#f5f5f5" stroke="#dee0e3" stroke-width="1.5" />
  <text x="760" y="316" fill="#1f2329" font-size="14" font-weight="bold">Auxiliary Commands</text>

  <!-- list / status / doctor -->
  <rect x="760" y="330" width="280" height="52" rx="4" fill="#ffffff" stroke="#bbbfc4" stroke-width="1" />
  <text x="776" y="352" fill="#1f2329" font-size="13" font-weight="bold">list / status / doctor</text>
  <text x="776" y="370" fill="#646a73" font-size="12">Readable checks &amp; profile health</text>

  <!-- Separator for isolation -->
  <line x1="760" y1="392" x2="1040" y2="392" stroke="#bbbfc4" stroke-width="1" stroke-dasharray="2 2" />

  <!-- self-update -->
  <rect x="760" y="402" width="280" height="44" rx="4" fill="#ffffff" stroke="#bbbfc4" stroke-width="1" />
  <text x="776" y="422" fill="#5178c6" font-size="13" font-weight="bold">self-update</text>
  <text x="862" y="422" fill="#646a73" font-size="12">Strictly isolated updater</text>


  <!-- ========================================================= -->
  <!-- ZONE 4: SECURITY BOUNDARIES (BOTTOM RIGHT)                -->
  <!-- ========================================================= -->
  <rect x="740" y="480" width="320" height="200" rx="8" fill="#fee3e2" stroke="#d25d5a" stroke-width="1.5" stroke-dasharray="2 2" />

  <!-- Shield Icon -->
  <path d="M 764 506 L 772 502 L 780 506 L 780 514 C 780 520 774 526 772 528 C 770 526 764 520 764 514 Z" fill="#d25d5a" />
  <text x="790" y="520" fill="#d25d5a" font-size="15" font-weight="bold">Security Boundaries</text>

  <!-- Bullet 1 -->
  <circle cx="768" cy="550" r="4" fill="#d25d5a" />
  <text x="784" y="554" fill="#1f2329" font-size="13">No auto-discovery</text>
  <!-- Bullet 2 -->
  <circle cx="768" cy="582" r="4" fill="#d25d5a" />
  <text x="784" y="586" fill="#1f2329" font-size="13">No shell snippets execution</text>
  <!-- Bullet 3 -->
  <circle cx="768" cy="614" r="4" fill="#d25d5a" />
  <text x="784" y="618" fill="#1f2329" font-size="13">No profile env support</text>
  <!-- Bullet 4 -->
  <circle cx="768" cy="646" r="4" fill="#d25d5a" />
  <text x="784" y="650" fill="#1f2329" font-size="13">No pkg-manager sources mod</text>


  <!-- ========================================================= -->
  <!-- ROUTING LINES & CONNECTIONS                               -->
  <!-- ========================================================= -->

  <!-- Read Profiles Line (XDG config -> Plan) -->
  <path d="M 760 172 L 715 172 L 715 265 L 495 265" fill="none" stroke="#8569cb" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow-read)" />
  <rect x="520" y="254" width="84" height="22" rx="2" fill="#ffffff" />
  <text x="562" y="270" fill="#8569cb" font-size="11" text-anchor="middle">Read profiles</text>

  <!-- Write State Line (Run -> XDG state) -->
  <path d="M 610 485 L 725 485 L 725 226 L 755 226" fill="none" stroke="#5178c6" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow-write)" />
  <rect x="626" y="474" width="76" height="22" rx="2" fill="#ffffff" />
  <text x="664" y="490" fill="#5178c6" font-size="11" text-anchor="middle">Write state</text>

</svg>
